
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATION CHECK LIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wtc-dark:  #001F3A;
            --wtc-navy:  #003B5C;
            --wtc-blue:  #0077B6;
            --wtc-cyan:  #00B4D8;
            --wtc-light: #90E0EF;
            --wtc-bg:    #F0F8FF;
            --wtc-accent:#00CFE8;
        }
        * { font-family: 'IBM Plex Sans Arabic', sans-serif; box-sizing: border-box; }
        body { background: var(--wtc-bg); color: #0d2137; -webkit-font-smoothing: antialiased; margin:0; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
        input[type="number"] { -moz-appearance:textfield; }

        /* ── Splash ── */
        #splash {
            position:fixed; inset:0; z-index:9999;
            background: var(--wtc-dark);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            overflow:hidden;
        }
        .sp-grid {
            position:absolute; inset:0;
            background-image: linear-gradient(rgba(0,180,216,.04) 1px,transparent 1px),
                              linear-gradient(90deg,rgba(0,180,216,.04) 1px,transparent 1px);
            background-size:40px 40px;
        }
        .sp-glow {
            position:absolute; inset:0;
            background: radial-gradient(ellipse at 20% 80%,rgba(0,180,216,.15) 0%,transparent 50%),
                        radial-gradient(ellipse at 80% 20%,rgba(0,95,142,.2) 0%,transparent 50%);
        }
        .sp-ripple {
            position:absolute; border-radius:50%;
            border:1px solid rgba(0,180,216,.12);
            animation: ripple 5s ease-out infinite;
        }
        .sp-ripple:nth-child(1){width:280px;height:280px;animation-delay:0s}
        .sp-ripple:nth-child(2){width:480px;height:480px;animation-delay:1.4s}
        .sp-ripple:nth-child(3){width:680px;height:680px;animation-delay:2.8s}
        @keyframes ripple { 0%{transform:scale(.5);opacity:.5} 100%{transform:scale(1.6);opacity:0} }

        .sp-content { position:relative; z-index:10; text-align:center; display:flex; flex-direction:column; align-items:center; gap:20px; }

        .sp-ring { position:relative; width:120px; height:120px; }
        .sp-ring svg { position:absolute; inset:0; animation: rotate 8s linear infinite; }
        @keyframes rotate { to { transform:rotate(360deg); } }
        .sp-logo-box {
            position:absolute; inset:14px; border-radius:50%;
            background:rgba(0,95,142,.25); backdrop-filter:blur(6px);
            border:1px solid rgba(0,180,216,.25);
            display:flex; align-items:center; justify-content:center; overflow:hidden;
        }
        .sp-logo-box img { width:62px; height:62px; object-fit:contain; }
        .sp-logo-fallback { color:var(--wtc-cyan); font-size:22px; font-weight:900; }

        .sp-title {
            color:rgba(255,255,255,.85); font-size:13px; font-weight:500; letter-spacing:.05em;
            opacity:0; animation: fadeUp .7s ease forwards .4s;
        }
        .sp-company { opacity:0; animation: fadeUp .7s ease forwards .7s; }
        .sp-company-ar { font-size:11px; font-weight:600; color:rgba(255,255,255,.8); }
        .sp-company-en { font-size:8px; font-weight:300; color:var(--wtc-cyan); letter-spacing:.2em; text-transform:uppercase; margin-top:3px; }

        .sp-bar-wrap { width:180px; opacity:0; animation: fadeUp .7s ease forwards 1s; }
        .sp-bar-bg { height:2px; background:rgba(255,255,255,.1); border-radius:99px; overflow:hidden; }
        .sp-bar-fill { height:100%; background:linear-gradient(90deg,var(--wtc-blue),var(--wtc-cyan),var(--wtc-accent)); border-radius:99px; width:0%; animation: fill 1.6s ease forwards 1.2s; }
        @keyframes fill { to { width:100%; } }
        .sp-bar-text { font-size:8px; color:rgba(255,255,255,.3); letter-spacing:.18em; text-align:center; margin-top:7px; font-weight:300; }

        .sp-year { position:absolute; bottom:28px; font-size:8px; color:rgba(255,255,255,.15); letter-spacing:.3em; font-weight:300; opacity:0; animation: fadeUp .7s ease forwards 1.3s; }

        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
        .sp-title, .sp-company, .sp-bar-wrap { transform:translateY(14px); }

        #splash.out { animation: splashOut .65s ease forwards; }
        @keyframes splashOut { to { opacity:0; transform:scale(1.03); pointer-events:none; } }

        /* ── Header ── */
        .wtc-header {
            background:linear-gradient(135deg, var(--wtc-dark) 0%, var(--wtc-navy) 60%, var(--wtc-blue) 100%);
            border-bottom:1px solid rgba(0,180,216,.18);
            position:sticky; top:0; z-index:100;
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 16px;
            box-shadow: 0 2px 16px rgba(0,30,60,.3);
        }
        .wtc-header-logo { height:36px; object-fit:contain; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:4px; }
        .wtc-header-name { font-size:11px; font-weight:700; color:#90E0EF; }
        .wtc-header-sub  { font-size:7px; font-weight:300; color:rgba(144,224,239,.55); letter-spacing:.18em; text-transform:uppercase; margin-top:2px; }
        .sup-btn { padding:7px 13px; border-radius:11px; font-size:10px; font-weight:700; background:rgba(255,255,255,.08); color:rgba(255,255,255,.85); border:1px solid rgba(255,255,255,.13); cursor:pointer; transition:all .2s; white-space:nowrap; }
        .sup-btn:hover { background:rgba(255,255,255,.15); color:white; }

        /* ── Page bg by time ── */
        .bg-day   { background:linear-gradient(180deg,#e0f2fe 0%,var(--wtc-bg) 45%); min-height:calc(100vh - 56px); }
        .bg-night { background:linear-gradient(180deg,#001e3c 0%,#002d55 35%,#0d2137 65%,var(--wtc-bg) 100%); min-height:calc(100vh - 56px); }

        /* ── Cards ── */
        .card { background:white; border:1.5px solid rgba(0,95,142,.1); border-radius:22px; box-shadow:0 4px 24px rgba(0,59,92,.08); }
        .card-dark { background:linear-gradient(135deg,var(--wtc-dark),var(--wtc-navy)); border:1px solid rgba(0,180,216,.15); border-radius:20px; box-shadow:0 6px 24px rgba(0,30,60,.3); position:relative; overflow:hidden; }
        .card-dark::before { content:''; position:absolute; top:-40px; right:-40px; width:120px; height:120px; background:radial-gradient(circle,rgba(0,180,216,.18),transparent 70%); border-radius:50%; }

        /* ── Input ── */
        .wtc-input { width:100%; padding:13px 16px; border:1.5px solid rgba(0,95,142,.18); border-radius:13px; font-size:12px; font-family:'IBM Plex Sans Arabic',sans-serif; background:rgba(240,248,255,.7); color:var(--wtc-navy); text-align:center; outline:none; transition:all .2s; }
        .wtc-input:focus { border-color:var(--wtc-blue); background:white; box-shadow:0 0 0 3px rgba(0,119,182,.12); }
        select.wtc-input { cursor:pointer; }
        textarea.wtc-input { text-align:right; resize:none; }

        /* ── Buttons ── */
        .btn-primary { width:100%; padding:14px 20px; background:linear-gradient(135deg,var(--wtc-navy),var(--wtc-blue)); color:white; border:none; border-radius:13px; font-size:12px; font-weight:700; font-family:'IBM Plex Sans Arabic',sans-serif; cursor:pointer; transition:all .25s; box-shadow:0 4px 18px rgba(0,95,142,.35); }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 7px 26px rgba(0,95,142,.45); }
        .btn-primary:active { transform:scale(.98); }

        .btn-exit { font-size:10px; background:#fee2e2; color:#991b1b; border:none; padding:8px 13px; border-radius:11px; font-weight:700; cursor:pointer; font-family:'IBM Plex Sans Arabic',sans-serif; transition:all .2s; }
        .btn-exit:hover { background:#fecaca; }
        .btn-back { background:white; padding:8px 13px; border-radius:11px; font-size:10px; font-weight:700; color:#64748b; border:1.5px solid rgba(0,95,142,.12); cursor:pointer; font-family:'IBM Plex Sans Arabic',sans-serif; box-shadow:0 1px 4px rgba(0,30,60,.06); transition:all .2s; }

        /* ── Status buttons ── */
        .s-btn { padding:12px 6px; border-radius:13px; font-size:10px; font-weight:700; text-align:center; border:1.5px solid rgba(0,95,142,.1); background:#f0f8ff; color:#475569; cursor:pointer; transition:all .2s; font-family:'IBM Plex Sans Arabic',sans-serif; }
        .s-btn.ok   { background:#064e3b; color:white; border-color:#064e3b; }
        .s-btn.rem  { background:#92400e; color:white; border-color:#78350f; }
        .s-btn.na   { background:#1e3a5f; color:white; border-color:#1e3a5f; }

        /* ── System cards ── */
        .sys-card { background:white; border:1.5px solid rgba(0,95,142,.1); border-radius:15px; padding:13px 15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:all .2s; box-shadow:0 1px 4px rgba(0,59,92,.05); }
        .sys-card:hover { background:#f0f8ff; border-color:rgba(0,119,182,.25); }
        .sys-card.ok  { border-color:rgba(16,185,129,.3); background:rgba(240,253,244,.7); }
        .sys-card.rem { border-color:rgba(245,158,11,.35); background:rgba(255,251,235,.7); }

        /* ── Badges ── */
        .badge { display:inline-block; padding:3px 9px; border-radius:99px; font-size:9px; font-weight:700; }
        .b-ok   { background:#d1fae5; color:#065f46; }
        .b-rem  { background:#fef3c7; color:#92400e; }
        .b-pend { background:#fee2e2; color:#991b1b; }
        .b-live { background:rgba(0,180,216,.15); color:var(--wtc-blue); }
        .line-badge { display:inline-block; font-size:8px; font-weight:700; padding:3px 9px; border-radius:6px; background:rgba(0,180,216,.12); color:var(--wtc-cyan); border:1px solid rgba(0,180,216,.2); letter-spacing:.08em; }

        /* ── Progress ── */
        .prog-fill { background:linear-gradient(90deg,var(--wtc-blue),var(--wtc-cyan)); height:100%; border-radius:99px; transition:width .6s cubic-bezier(.4,0,.2,1); }

        /* ── FAB ── */
        .fab { background:linear-gradient(135deg,var(--wtc-navy),var(--wtc-blue)); border-radius:50px; padding:13px 26px; color:white; font-weight:700; font-size:11px; border:1px solid rgba(255,255,255,.14); box-shadow:0 8px 28px rgba(0,30,60,.35); display:flex; align-items:center; gap:8px; cursor:pointer; transition:all .25s; font-family:'IBM Plex Sans Arabic',sans-serif; }
        .fab:hover { transform:translateY(-2px); box-shadow:0 12px 34px rgba(0,30,60,.45); }

        /* ── Sticky save bar ── */
        .save-bar { position:fixed; bottom:0; right:0; width:100%; padding:14px; background:rgba(255,255,255,.93); backdrop-filter:blur(12px); border-top:1px solid rgba(0,95,142,.1); box-shadow:0 -4px 20px rgba(0,30,60,.07); z-index:40; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-thumb { background:rgba(0,95,142,.25); border-radius:99px; }

        /* ── Transition ── */
        .fade { transition: opacity .25s ease; }

        /* ── Banner bar (no greeting text) ── */
        .shift-bar { border-radius:18px; padding:16px 18px; position:relative; overflow:hidden; margin-bottom:18px; }
        .shift-bar.day   { background:linear-gradient(135deg,var(--wtc-blue),var(--wtc-cyan)); color:white; }
        .shift-bar.night { background:linear-gradient(135deg,var(--wtc-dark),var(--wtc-navy)); color:white; border:1px solid rgba(0,180,216,.18); }
        .shift-bar::after { content:''; position:absolute; top:-18px; left:-18px; width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,.06); }

        /* ── Modal overlay ── */
        .overlay { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; background:rgba(0,15,40,.75); backdrop-filter:blur(6px); }
    </style>
</head>
<body>

<!-- ════ SPLASH ════ -->
<div id="splash">
    <div class="sp-grid"></div>
    <div class="sp-glow"></div>
    <div class="sp-ripple"></div>
    <div class="sp-ripple"></div>
    <div class="sp-ripple"></div>
    <div class="sp-content">
        <div class="sp-ring">
            <svg viewBox="0 0 120 120" fill="none">
                <circle cx="60" cy="60" r="55" stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="7 4"/>
                <defs>
                    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00B4D8" stop-opacity=".8"/>
                        <stop offset="50%" stop-color="#003B5C" stop-opacity=".15"/>
                        <stop offset="100%" stop-color="#00B4D8" stop-opacity=".8"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="sp-logo-box">
                <!-- *** ضع رابط أو مسار اللوقو PNG هنا في src *** -->
                <img src="https://cdn.phototourl.com/free/2026-05-25-531ef0be-b99a-4016-a928-effa7a2c41ac.png"
                     alt="WTC Logo"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="sp-logo-fallback" style="display:none; align-items:center; justify-content:center; width:100%; height:100%;">WTC</div>
            </div>
        </div>
        <div class="sp-title">STATIONS CHECK LIST</div>
        <div class="sp-company">
            <div class="sp-company-ar">شركة نقل المياه (WTCO) — الجبيل</div>
            <div class="sp-company-en">Water Transmission Company</div>
        </div>
        <div class="sp-bar-wrap">
            <div class="sp-bar-bg"><div class="sp-bar-fill"></div></div>
            <div class="sp-bar-text">INITIALIZING FIELD SYSTEM · 2026</div>
        </div>
    </div>
    <div class="sp-year">WTCO FIELD OPS · 2026 · JWTS</div>
</div>

<!-- ════ APP ════ -->
<div id="app" style="display:none;">

    <!-- HEADER -->
    <header class="wtc-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <!-- *** مكان اللوقو في الهيدر — غيّر src بمسار ملفك *** -->
            <img src="https://cdn.phototourl.com/free/2026-05-25-531ef0be-b99a-4016-a928-effa7a2c41ac.png"
                 alt="WTC" class="wtc-header-logo"
                 onerror="this.style.display='none'">
            <div>
                <div class="wtc-header-name">شركة نقل المياه  — الجبيل</div>
                <div class="wtc-header-sub">Water Transmission Company</div>
            </div>
        </div>
        <button class="sup-btn" id="supBtn">🔒 دخول المشرفين</button>
    </header>

    <!-- SCREENS CONTAINER -->
    <div id="screens" style="padding-bottom:32px;"></div>

</div>

<!-- ════ TEMPLATES ════ -->

<template id="tpl-login">
<div class="pad">
    <div class="shift-bar" id="shiftBar">
        <div style="display:flex;align-items:center;gap:12px;position:relative;z-index:1;">
            <span style="font-size:24px;" id="shiftIcon"></span>
            <div>
                <div style="font-size:14px;font-weight:700;">STATION CHECK LIST</div>
                <div style="font-size:10px;opacity:.75;margin-top:2px;" id="shiftLabel"></div>
            </div>
        </div>
    </div>
    <div class="card" style="padding:24px;">
        <div style="text-align:center;padding-bottom:18px;border-bottom:1px solid rgba(0,95,142,.09);margin-bottom:20px;">
            <div style="width:50px;height:50px;background:linear-gradient(135deg,#003B5C,#0077B6);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                <svg width="22" height="22" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <div style="font-size:15px;font-weight:700;color:#003B5C;">تسجيل الدخول </div>
            <div style="font-size:10px;color:#64748b;margin-top:4px;"></div>
        </div>
        <div style="margin-bottom:14px;">
            <label style="display:block;font-size:10px;font-weight:700;color:#5a7fa0;margin-bottom:6px;">👤 الرقم الوظيفي للمشغل (WTCO)</label>
            <input type="number" id="inpID" class="wtc-input" placeholder="أدخل رقمك الوظيفي">
        </div>
        <div style="margin-bottom:18px;">
            <label style="display:block;font-size:10px;font-weight:700;color:#5a7fa0;margin-bottom:6px;">🔑 الرمز السري المرتبط (PIN)</label>
            <input type="password" id="inpPIN" class="wtc-input" placeholder="••••" style="letter-spacing:.3em;">
        </div>
        <button class="btn-primary" id="btnLogin">🔐 إضغط للدخول</button>
    </div>
</div>
</template>

<template id="tpl-selectStation">
<div class="pad">
    <div class="card" style="padding:22px;">
        <div style="text-align:center;padding-bottom:14px;border-bottom:1px solid rgba(0,95,142,.09);margin-bottom:16px;">
            <div style="font-size:26px;">📍</div>
            <div style="font-size:14px;font-weight:700;color:#003B5C;margin-top:6px;">المحطات المصرحة للحساب</div>
        </div>
        <div id="stationList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
</div>
</template>

<template id="tpl-systems">
<div class="pad">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div>
            <span class="line-badge" id="lblLine"></span>
            <div style="font-size:20px;font-weight:700;color:#003B5C;margin-top:4px;" id="lblStation"></div>
        </div>
        <button class="btn-exit" id="btnLogout">خروج ↩</button>
    </div>
    <div class="card-dark" style="padding:16px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;margin-bottom:12px;">
            <div>
                <div style="font-size:9px;color:#90e0ef;font-weight:600;">👤 الرقم المسؤول: <span style="color:#00CFE8;" id="lblOp"></span></div>
                <div style="font-size:11px;font-weight:700;color:white;margin-top:4px;" id="lblShift"></div>
            </div>
            <div style="background:rgba(0,30,60,.5);padding:10px 14px;border-radius:13px;text-align:center;border:1px solid rgba(0,180,216,.2);">
                <div style="font-size:8px;color:#90e0ef;">مؤشر الفحص</div>
                <div style="font-size:22px;font-weight:700;color:#00CFE8;font-variant-numeric:tabular-nums;" id="kpiNum">0%</div>
            </div>
        </div>
        <div style="width:100%;background:rgba(255,255,255,.08);height:3px;border-radius:99px;overflow:hidden;position:relative;z-index:1;">
            <div class="prog-fill" id="kpiBar" style="width:0%"></div>
        </div>
    </div>
    <div style="background:rgba(0,119,182,.07);border:1px solid rgba(0,119,182,.14);border-radius:13px;padding:8px 12px;font-size:10px;color:#005F8E;font-weight:600;text-align:center;margin-bottom:12px;">
        ⚙️ يمكنك التعديل والحفظ مراراً.
    </div>
    <div style="font-size:9px;font-weight:700;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">⚙️ أنظمة المحطة :</div>
    <div id="systemsList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:90px;"></div>
    <div style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:40;">
        <button class="fab" id="btnSync">
            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            إرسال التقرير للمشرف
        </button>
    </div>
</div>
</template>

<template id="tpl-checklist">
<div class="pad" style="padding-bottom:90px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <button class="btn-back" id="btnBackSys">↩ إلغاء والتراجع</button>
        <span style="font-size:10px;background:#001F3A;color:#00CFE8;font-weight:700;padding:6px 13px;border-radius:8px;" id="clkStation"></span>
    </div>
    <div class="card" style="padding:16px;margin-bottom:14px;">
        <div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid rgba(0,95,142,.08);padding-bottom:8px;margin-bottom:12px;">📋 Check Items </div>
        <p style="font-size:11px;font-weight:500;color:#1e3a5f;background:rgba(0,95,142,.04);padding:13px;border-radius:11px;border:1px solid rgba(0,95,142,.07);text-align:left;line-height:2;direction:ltr;margin:0;">
            1- Check if the system unit status is normal and running without active alarms.<br>
            2- Check if any leakage, abnormal noise, or high temperature is detected in the zone.<br>
          2- Check if any leakage, abnormal noise, or high temperature is detected in the zone.<br>
          2- Check if any leakage, abnormal noise, or high temperature is detected in the zone.
        </p>
    </div>
    <div class="card" style="padding:16px;">
        <div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;">🎯 النتيجة الإجمالية للنظام:</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
            <button class="s-btn" id="sOk" onclick="setStatus('no_obs')">✓ NO OBSERVATION</button>

const STATIONS = {
    'ps1ab':{line:'AB LINES',name:'PS1 AB'},'ps2ab':{line:'AB LINES',name:'PS2 AB'},'ps3ab':{line:'AB LINES',name:'PS3 AB'},
    'ps4ab':{line:'AB LINES',name:'PS4 AB'},'ps5ab':{line:'AB LINES',name:'PS5 AB'},'ps6ab':{line:'AB LINES',name:'PS6 AB'},
    'hptab':{line:'AB LINES',name:'HPT AB'},
    'ps1c':{line:'C LINES',name:'PS1 C'},'ps2c':{line:'C LINES',name:'PS2 C'},'ps3c':{line:'C LINES',name:'PS3 C'},'hptc':{line:'C LINES',name:'HPT C'},
    'ps1fg':{line:'FG LINES',name:'PS1 FG'},'ps2fg':{line:'FG LINES',name:'PS2 FG'},'ps3fg':{line:'FG LINES',name:'PS3 FG'},'hptfg':{line:'FG LINES',name:'HPT FG'}
};

const SYS_ABC = ['AIR CONDITIONING&VENTILATION SYS-1','AIR CONDITIONING&VENTILATION SYS-2','COOLING WATER SYSTEM','DRINKING AND UTILITY','ELECTRICAL BUILDING CABLE CELLAER','EMERGENCY GENERATOR','FLOW CONTROL VALVE MAIN','LOW VOLTAGE ROOM','MAIN PUMP HOUSE','MEDIUM VOLTAGE ROOM','PRESSUR CONTROL VALVE','SEWAGE SYSTEM','STATION BATTERIES ROOM','SURGE RELIEF SYSTEM','UNIT CONTROL&FEEDBACK EQUIPMENT','Scraper'];
const SYS_FG  = ['AIR COMPERSSOR SYSTEM','BOOSTER PUMP HOUSE','COOLING WATER SYSTEM','ELECTRICAL VSD BULDING','EMERGENCY GENERATOR','HV, MV, LV, VSD TRANSFORMERS','HVAC AND CHILLERS','INLET SURGE VESSEL SYSTEM','LOW VOLTAGE ROOM','MAIN PUMP HOUSE','MEDIUM VOLTAGE ROOM','OUTLET SURGE VESSEL SYSTEM','PRESSURE RELIEF SYSTEM','TANK FARM AREA','UTILITY & FIRE DIESEL PUPM SYSTEM'];

// ── STATE ─────────────────────────────────────────────────────────────────
var state = {
    screen: 'login',
    opID: '', opPIN: '',
    line: '', station: '',
    shift: '', date: new Date().toISOString().split('T')[0],
    allowedCodes: [],
    isAdmin: false, supervisor: null,
    adminStation: '', adminDate: new Date().toISOString().split('T')[0],
    system: '', status: 'no_obs', note: '', images: [],
    logs: JSON.parse(localStorage.getItem('wtc_logs') || '[]')
};

// ── HELPERS ───────────────────────────────────────────────────────────────
function getSystems(st) { return st && st.includes('FG') ? SYS_FG : SYS_ABC; }
function getShift() { var h = new Date().getHours(); return (h>=6&&h<18)?'صباحي':'مسائي'; }
function getLog(sys, st, sh, dt) {
    st = st || state.station; sh = sh || state.shift; dt = dt || state.date;
    return state.logs.find(l => l.station===st && l.system===sys && l.shift===sh && l.date===dt);
}
function isChecked(sys, st, sh, dt) { return !!getLog(sys, st, sh, dt); }
function kpi(st) {
    var sys = getSystems(st||state.station);
    if(!sys.length) return 0;
    return Math.round(sys.filter(s=>isChecked(s,st)).length/sys.length*100);
}
function saveLogs() { localStorage.setItem('wtc_logs', JSON.stringify(state.logs)); }
function cloneTemplate(id) {
    var t = document.getElementById(id);
    return t.content.cloneNode(true);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
    var sc = document.getElementById('screens');
    // remove all children safely
    while(sc.firstChild) sc.removeChild(sc.firstChild);

    var h = new Date().getHours();
    var isNight = (h>=18||h<6);

    if (state.screen === 'login')         renderLogin(sc, isNight);
    else if (state.screen === 'select')   renderSelect(sc);
    else if (state.screen === 'systems')  renderSystems(sc);
    else if (state.screen === 'checklist') renderChecklist(sc);
    else if (state.screen === 'adminSel') renderAdminSelect(sc);
    else if (state.screen === 'history')  renderHistory(sc);
}

function renderLogin(sc, isNight) {
    var node = cloneTemplate('tpl-login');
    var bar = node.getElementById('shiftBar');
    bar.classList.add(isNight ? 'night' : 'day');
    node.getElementById('shiftIcon').textContent = isNight ? '🌙' : '☀️';
    node.getElementById('shiftLabel').textContent = isNight ? 'الوردية المسائية' : 'الوردية الصباحية';
    node.getElementById('btnLogin').onclick = doLogin;
    node.getElementById('inpID').onkeyup   = function(e){ if(e.key==='Enter') doLogin(); };
    node.getElementById('inpPIN').onkeyup  = function(e){ if(e.key==='Enter') doLogin(); };
    sc.appendChild(node);
    // wrap in bg
    sc.firstElementChild.className = 'pad';
    sc.style.background = isNight
        ? 'linear-gradient(180deg,#001e3c 0%,#002d55 35%,#0d2137 65%,#F0F8FF 100%)'
        : 'linear-gradient(180deg,#e0f2fe 0%,#F0F8FF 45%)';
    sc.style.minHeight = 'calc(100vh - 56px)';
}

function renderSelect(sc) {
    sc.style.background = ''; sc.style.minHeight = '';
    var node = cloneTemplate('tpl-selectStation');
    var list = node.getElementById('stationList');
    state.allowedCodes.forEach(function(code){
        var btn = document.createElement('button');
        btn.style.cssText = 'width:100%;padding:14px 16px;border-radius:15px;text-align:right;font-size:12px;font-weight:700;background:#f0f8ff;border:1.5px solid rgba(0,95,142,.1);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:IBM Plex Sans Arabic,sans-serif;transition:all .2s;';
        btn.innerHTML = '<span style="color:#003B5C;">'+STATIONS[code].name+'</span><span class="line-badge">'+STATIONS[code].line+'</span>';
        btn.onmouseover = function(){ this.style.borderColor='#0077B6'; this.style.background='#e0f2fe'; };
        btn.onmouseout  = function(){ this.style.borderColor='rgba(0,95,142,.1)'; this.style.background='#f0f8ff'; };
        btn.onclick = function(){ selectStation(code); };
        list.appendChild(btn);
    });
    sc.appendChild(node);
}

function renderSystems(sc) {
    sc.style.background = ''; sc.style.minHeight = '';
    var node = cloneTemplate('tpl-systems');
    node.getElementById('lblLine').textContent    = state.line;
    node.getElementById('lblStation').textContent = state.station;
    node.getElementById('lblOp').textContent      = state.opID;
    node.getElementById('lblShift').textContent   = state.shift==='صباحي'?'☀️ الوردية الصباحية':'🌙 الوردية المسائية';
    var k = kpi();
    node.getElementById('kpiNum').textContent = k+'%';
    node.getElementById('kpiBar').style.width = k+'%';
    node.getElementById('btnLogout').onclick = function(){ state.opID=''; state.screen='login'; render(); };
    node.getElementById('btnSync').onclick = function(){ if(confirm('هل أنت متأكد من إرسال التقرير النهائي؟')) alert('🔄 تم إرسال التقرير بنجاح!'); };

    var list = node.getElementById('systemsList');
    getSystems(state.station).forEach(function(sys){
        var log = getLog(sys);
        var isOk = log && log.status !== 'remark';
        var isRem = log && log.status === 'remark';
        var btn = document.createElement('button');
        btn.className = 'sys-card' + (isOk?' ok':(isRem?' rem':''));
        btn.style.width = '100%';
        btn.innerHTML =
            '<span style="font-size:11px;font-weight:600;color:#1e3a5f;width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+sys+'</span>'+
            '<span class="badge '+(log?(isRem?'b-rem':'b-ok'):'b-pend')+'">'+(log?(isRem?'✓ تعديل ⚠️':'✓ مراجعة'):'معلق')+'</span>';
        btn.onclick = function(){ openChecklist(sys); };
        list.appendChild(btn);
    });
    sc.appendChild(node);
}

function renderChecklist(sc) {
    sc.style.background = ''; sc.style.minHeight = '';
    var node = cloneTemplate('tpl-checklist');
    node.getElementById('clkStation').textContent = state.station;
    node.getElementById('btnBackSys').onclick = function(){ state.screen='systems'; render(); };

    // restore state
    updateStatusUI(node, state.status);
    if(state.note) node.getElementById('noteArea').value = state.note;
    refreshImgGrid(node);

    node.getElementById('sOk').onclick  = function(){ setStatus('no_obs'); };
    node.getElementById('sRem').onclick = function(){ setStatus('remark'); };
    node.getElementById('sNa').onclick  = function(){ setStatus('na'); };

    node.getElementById('imgInput').onchange = function(e){ handleImgUpload(e); };
    node.getElementById('btnSave').onclick = doSave;
    sc.appendChild(node);
}

function renderAdminSelect(sc) {
    sc.style.background = ''; sc.style.minHeight = '';
    var node = cloneTemplate('tpl-adminSelect');
    var list = node.getElementById('adminStationList');
    if(state.supervisor){
        state.supervisor.stations.forEach(function(st){
            var btn = document.createElement('button');
            btn.style.cssText = 'width:100%;padding:13px;border-radius:14px;font-size:12px;font-weight:700;background:#f0f8ff;border:1.5px solid rgba(0,95,142,.12);text-align:center;cursor:pointer;font-family:IBM Plex Sans Arabic,sans-serif;transition:all .2s;color:#003B5C;';
            btn.textContent = st;
            btn.onmouseover = function(){ this.style.borderColor='#0077B6'; this.style.background='#e0f2fe'; };
            btn.onmouseout  = function(){ this.style.borderColor='rgba(0,95,142,.12)'; this.style.background='#f0f8ff'; };
            btn.onclick = function(){ state.adminStation=st; state.screen='history'; render(); };
            list.appendChild(btn);
        });
    }
    sc.appendChild(node);
}

function renderHistory(sc) {
    sc.style.background = ''; sc.style.minHeight = '';
    var node = cloneTemplate('tpl-history');
    node.getElementById('btnBackAdmin').onclick = function(){ state.screen='adminSel'; render(); };

    var selSt = node.getElementById('adminStation');
    if(state.supervisor){
        state.supervisor.stations.forEach(function(st){
            var o = document.createElement('option');
            o.value = st; o.textContent = st;
            if(st===state.adminStation) o.selected = true;
            selSt.appendChild(o);
        });
    }
    selSt.onchange = function(){ state.adminStation=this.value; renderHistoryShifts(node); };

    var dateIn = node.getElementById('adminDate');
    dateIn.value = state.adminDate;
    dateIn.onchange = function(){ state.adminDate=this.value; renderHistoryShifts(node); };

    sc.appendChild(node);
    renderHistoryShifts(document.getElementById('screens'));
}

function renderHistoryShifts(sc) {
    var cont = sc.getElementById ? sc.getElementById('historyShifts') : document.getElementById('historyShifts');
    if(!cont) return;
    while(cont.firstChild) cont.removeChild(cont.firstChild);
    ['صباحي','مسائي'].forEach(function(sh){
        var card = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = '14px'; card.style.overflow = 'hidden';
        var header = document.createElement('div');
        header.style.cssText = 'padding:11px 13px;font-size:11px;font-weight:700;color:#003B5C;border-bottom:1px solid rgba(0,95,142,.08);background:rgba(0,95,142,.03);';
        header.textContent = sh==='صباحي'?'☀️ الوردية الصباحية':'🌙 الوردية المسائية';
        card.appendChild(header);
        var body = document.createElement('div');
        body.style.cssText = 'padding:10px;display:flex;flex-direction:column;gap:6px;';
        getSystems(state.adminStation).forEach(function(sys){
            var log = getLog(sys, state.adminStation, sh, state.adminDate);
            var btn = document.createElement('button');
            btn.className = 'admin-sys-btn';
            var checked = !!log;
            btn.style.background = checked ? 'rgba(240,253,244,.7)' : 'rgba(254,242,242,.5)';
            btn.style.borderColor = checked ? 'rgba(16,185,129,.2)' : 'rgba(254,202,202,.6)';
            btn.style.cursor = checked ? 'pointer' : 'not-allowed';
            btn.innerHTML =
                '<div style="width:60%;"><div style="font-weight:700;color:#1e3a5f;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+sys+'</div>'+
                (checked?'<div style="font-size:9px;color:#64748b;margin-top:3px;">🕒 '+log.time+' &nbsp;<span class="badge b-live">📬 رصد حي</span></div>':'')+
                '</div>'+
                '<span class="badge '+(checked?(log.status==='no_obs'?'b-ok':'b-rem'):'b-pend')+'">'+(checked?(log.status==='no_obs'?'سليم':'ملاحظة ⚠️'):'⚠️ معلق')+'</span>';
            if(checked){
                btn.onclick = function(){ showLogModal(log); };
            }
            body.appendChild(btn);
        });
        card.appendChild(body);
        cont.appendChild(card);
    });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function doLogin() {
    var id  = document.getElementById('inpID').value.trim();
    var pin = document.getElementById('inpPIN').value.trim();
    if(!id||!pin){ alert('⚠️ يرجى إدخال الرقم الوظيفي والرمز السري.'); return; }
    if(!OPERATORS[id]){ alert('❌ الحساب غير مسجل بنظام محطات WTC.'); return; }
    if(OPERATORS[id].pin!==pin){ alert('❌ الرمز السري الشخصي (PIN) غير صحيح!'); return; }
    state.opID = id;
    state.shift = getShift();
    var codes = OPERATORS[id].codes;
    state.allowedCodes = codes;
    if(codes.length===1){
        state.line    = STATIONS[codes[0]].line;
        state.station = STATIONS[codes[0]].name;
        state.screen  = 'systems';
    } else {
        state.screen = 'select';
    }
    render();
}

function selectStation(code) {
    state.line    = STATIONS[code].line;
    state.station = STATIONS[code].name;
    state.screen  = 'systems';
    render();
}

function openChecklist(sys) {
    state.system = sys;
    var log = getLog(sys);
    if(log){ state.status=log.status; state.note=log.note; state.images=[...(log.images||[])]; }
    else    { state.status='no_obs'; state.note=''; state.images=[]; }
    state.screen = 'checklist';
    render();
}

var currentStatus = 'no_obs';
function setStatus(s) {
    state.status = s;
    var sc = document.getElementById('screens');
    updateStatusUI(sc, s);
    var box = document.getElementById('remarkBox');
    if(box) box.style.display = (s==='remark') ? 'block' : 'none';
}

function updateStatusUI(root, s) {
    ['sOk','sRem','sNa'].forEach(function(id){
        var el = root.getElementById ? root.getElementById(id) : document.getElementById(id);
        if(el) el.className = 's-btn';
    });
    var map = {no_obs:'sOk', remark:'sRem', na:'sNa'};
    var css = {no_obs:'ok', remark:'rem', na:'na'};
    var el = root.getElementById ? root.getElementById(map[s]) : document.getElementById(map[s]);
    if(el) el.className = 's-btn ' + css[s];
    var box = root.getElementById ? root.getElementById('remarkBox') : document.getElementById('remarkBox');
    if(box) box.style.display = (s==='remark') ? 'block' : 'none';
}

function handleImgUpload(e) {
    var files = e.target.files;
    if(!files||!files.length) return;
    var rem = 4 - state.images.length;
    if(rem<=0){ alert('لقد وصلت للحد الأقصى (4 صور).'); return; }
    var n = Math.min(files.length, rem);
    for(var i=0;i<n;i++){
        (function(f){
            var r = new FileReader();
            r.onload = function(ev){ state.images.push(ev.target.result); refreshImgGrid(document.getElementById('screens')); };
            r.readAsDataURL(f);
        })(files[i]);
    }
    e.target.value='';
}

function refreshImgGrid(root) {
    var grid = root.getElementById ? root.getElementById('imgGrid') : document.getElementById('imgGrid');
    var maxP = root.getElementById ? root.getElementById('imgMax')  : document.getElementById('imgMax');
    var inp  = root.getElementById ? root.getElementById('imgInput'): document.getElementById('imgInput');
    if(!grid) return;
    while(grid.firstChild) grid.removeChild(grid.firstChild);
    if(state.images.length>0){
        grid.style.display = 'grid';
        state.images.forEach(function(src, idx){
            var wrap = document.createElement('div');
            wrap.style.position = 'relative';
            var img = document.createElement('img');
            img.src = src;
            img.style.cssText = 'width:100%;height:110px;object-fit:cover;border-radius:10px;border:1px solid rgba(0,95,142,.12);';
            var del = document.createElement('button');
            del.textContent = '✕';
            del.style.cssText = 'position:absolute;top:4px;right:4px;background:#dc2626;color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;';
            del.onclick = function(){ state.images.splice(idx,1); refreshImgGrid(document.getElementById('screens')); };
            wrap.appendChild(img); wrap.appendChild(del);
            grid.appendChild(wrap);
        });
    } else {
        grid.style.display = 'none';
    }
    if(maxP) maxP.style.display = state.images.length>=4 ? 'block' : 'none';
    if(inp)  inp.style.display  = state.images.length>=4 ? 'none'  : 'block';
}

function doSave() {
    var note = document.getElementById('noteArea') ? document.getElementById('noteArea').value.trim() : state.note;
    if(state.status==='remark'){
        if(!note){ alert('⚠️ في حالة وجود ملاحظة، يجب كتابة التفاصيل الميدانية.'); return; }
        if(!state.images.length){ alert('📸 إجباري: يجب إرفاق صورة واحدة على الأقل!'); return; }
    }
    state.note = note;
    var now = new Date();
    var time = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    var entry = {
        operator:state.opID, line:state.line, station:state.station,
        system:state.system, shift:state.shift, date:state.date, time:time,
        status:state.status, note:state.status==='no_obs'?'لا يوجد ملاحظات':state.note,
        images:[...state.images]
    };
    state.logs = state.logs.filter(function(l){ return !(l.station===state.station&&l.system===state.system&&l.shift===state.shift&&l.date===state.date); });
    state.logs.unshift(entry);
    saveLogs();
    state.screen='systems'; render();
}

function showLogModal(log) {
    var overlay = document.createElement('div');
    overlay.className = 'overlay';
    var box = document.createElement('div');
    box.className = 'card';
    box.style.cssText = 'width:100%;max-width:440px;padding:20px;max-height:88vh;overflow-y:auto;';
    var imgs = (log.images||[]).map(function(src){
        return '<img src="'+src+'" style="width:100%;height:120px;object-fit:cover;border-radius:11px;border:1px solid rgba(0,95,142,.12);cursor:pointer;" onclick="window.open(this.src)">';
    }).join('');
    box.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid rgba(0,95,142,.09);margin-bottom:14px;"><span style="font-size:12px;font-weight:700;color:#003B5C;width:85%;overflow:hidden;text-overflow:ellipsis;">'+log.system+'</span><button onclick="this.closest(\'.overlay\').remove()" style="background:none;border:none;font-size:24px;font-weight:700;color:#94a3b8;cursor:pointer;line-height:1;">×</button></div>'+
        '<div style="background:rgba(0,95,142,.04);padding:13px;border-radius:12px;border:1px solid rgba(0,95,142,.08);font-size:11px;margin-bottom:12px;">'+
        '<div style="margin-bottom:5px;">👤 المشغل: <strong>'+log.operator+'</strong></div>'+
        '<div style="margin-bottom:5px;">📅 التاريخ: '+log.date+'</div>'+
        '<div>🕒 التوقيت: <strong style="color:#0077B6;">'+log.time+'</strong></div></div>'+
        '<div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:6px;">📝 الملاحظة:</div>'+
        '<div style="background:rgba(0,95,142,.04);padding:12px;border-radius:11px;border:1px solid rgba(0,95,142,.07);font-size:11px;color:#1e3a5f;margin-bottom:'+(imgs?'12px':'0')+';">'+log.note+'</div>'+
        (imgs?'<div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:8px;">📸 الصور:</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+imgs+'</div>':'')+
        '<button onclick="this.closest(\'.overlay\').remove()" class="btn-primary" style="margin-top:14px;">إغلاق التقرير</button>';
    overlay.appendChild(box);
    overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };
    document.body.appendChild(overlay);
}

// ── SUPERVISOR ────────────────────────────────────────────────────────────
document.getElementById('supBtn').onclick = function(){
    if(state.isAdmin){
        state.isAdmin=false; state.supervisor=null;
        this.textContent='🔒 دخول المشرفين';
        state.screen='login'; render();
    } else {
        var pass = prompt('الرجاء إدخال الرمز السري للمشرف:');
        if(pass===null) return;
        var sup = SUPERVISORS.find(function(s){ return s.pass===pass; });
        if(sup){
            state.isAdmin=true; state.supervisor=sup;
            state.adminStation=sup.stations[0]||'';
            document.getElementById('supBtn').textContent='🔓 خروج المشرف';
            state.screen='adminSel'; render();
        } else {
            alert('⚠️ الرمز السري للمشرف غير صحيح!');
        }
    }
};

// ── SPLASH → APP ──────────────────────────────────────────────────────────
function startApp() {
    setTimeout(function(){
        var splash = document.getElementById('splash');
        splash.classList.add('out');
        setTimeout(function(){
            splash.style.display = 'none';
            document.getElementById('app').style.display = '';
            render();
        }, 650);
    }, 2600);
}

if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', startApp);
} else {
    startApp();
}
</script>
